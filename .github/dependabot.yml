version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        patterns:
          - "wrangler"
          - "vitest"
          - "@cloudflare/vitest-pool-workers"
        update-types:
          - minor
          - patch
